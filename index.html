<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWEEPBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1814; --ink-soft:#46413a; --faint:#7a7066;
    --paper:#f4efe2; --paper-2:#efe8d8; --rule:#1a1814; --hair:#c9bfa9;
    --accent:#7a1f12; /* oxblood */
    --paper-light:#fbf8ef; --hover-bg:#efe7d4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Roboto',sans-serif;
    color:var(--ink); line-height:1.5; min-height:100vh;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0 2px, transparent 2px 4px),
      radial-gradient(circle at 20% 0%, rgba(120,31,18,0.04), transparent 45%),
      var(--paper);
    padding:28px 16px 60px;
  }
  .sheet{
    max-width:980px; margin:0 auto; background:var(--paper);
    border:1px solid var(--ink);
    box-shadow:0 1px 0 var(--ink), 6px 8px 0 rgba(26,24,20,0.10);
    padding:0;
  }
  .pad{padding:26px 34px}
  /* ---- Masthead ---- */
  .masthead{text-align:center; border-bottom:3px double var(--ink); padding:22px 20px 16px}
  .ear{display:flex; justify-content:space-between; font-family:'Roboto',sans-serif;
    font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft);
    border-bottom:1px solid var(--ink); padding:6px 14px}
  .nameplate{
    font-family:'Roboto',sans-serif; font-weight:900;
    font-size:clamp(38px,9vw,86px); line-height:.92; letter-spacing:-1px;
    cursor:pointer; user-select:none; margin:6px 0 4px;
  }
  .nameplate .amp{font-style:italic; font-weight:400}
  .motto{font-family:'Roboto',sans-serif; font-style:italic; color:var(--ink-soft);
    font-size:15px; margin-top:6px}
  .dateline{display:flex; justify-content:space-between; align-items:center;
    border-top:1px solid var(--ink); border-bottom:1px solid var(--ink);
    margin-top:16px; padding:5px 14px; font-family:'Roboto',sans-serif;
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft)}
  /* ---- Headlines ---- */
  .headline{font-family:'Roboto',sans-serif; font-weight:900; line-height:1.02;
    font-size:clamp(30px,6vw,52px); text-align:center; margin:6px 0 4px}
  .subhead{font-family:'Roboto',sans-serif; font-style:italic; text-align:center;
    color:var(--ink-soft); font-size:18px; border-bottom:1px solid var(--ink);
    padding-bottom:16px; margin-bottom:8px}
  .kicker{font-family:'Roboto',sans-serif; text-transform:uppercase; letter-spacing:3px;
    font-size:12px; color:var(--accent); font-weight:700; text-align:center}
  .section-rule{display:flex; align-items:center; gap:14px; margin:26px 0 16px}
  .section-rule::before,.section-rule::after{content:''; flex:1; height:0; border-top:1px solid var(--ink)}
  .section-rule span{font-family:'Roboto',sans-serif; text-transform:uppercase;
    letter-spacing:4px; font-size:13px; font-weight:700}
  .lead{font-size:18px; text-align:justify; hyphens:auto}
  .lead::first-letter{font-family:'Roboto',sans-serif; font-weight:900; float:left;
    font-size:62px; line-height:.7; padding:6px 8px 0 0; color:var(--accent)}
  .byline{font-family:'Roboto',sans-serif; font-size:12px; letter-spacing:1px;
    text-transform:uppercase; color:var(--faint); text-align:center; margin-bottom:14px}
  /* ---- Forms / buttons ---- */
  label.lbl{display:block; font-family:'Roboto',sans-serif; text-transform:uppercase;
    letter-spacing:2px; font-size:11px; color:var(--ink-soft); margin-bottom:6px}
  .input{width:100%; background:var(--paper-light); border:1px solid var(--ink); color:var(--ink);
    padding:12px 14px; font-size:17px; font-family:inherit; margin-bottom:14px}
  .input:focus{outline:none; box-shadow:inset 0 0 0 1px var(--ink)}
  textarea.input{min-height:110px; font-family:'Courier New',monospace; font-size:12px; resize:vertical}
  .btn{display:inline-block; background:var(--ink); color:var(--paper); border:1px solid var(--ink);
    padding:12px 22px; font-family:'Roboto',sans-serif; text-transform:uppercase;
    letter-spacing:2px; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; width:100%}
  .btn:hover{background:var(--accent); border-color:var(--accent)}
  .btn:disabled{opacity:.35; cursor:not-allowed}
  .btn.line{background:transparent; color:var(--ink)}
  .btn.line:hover{background:var(--ink); color:var(--paper)}
  .btn.sm{width:auto; padding:6px 14px; font-size:11px; letter-spacing:1px}
  .err{color:var(--accent); font-style:italic; margin-bottom:12px}
  /* ---- Stats strip ---- */
  .strip{display:flex; border-top:2px solid var(--ink); border-bottom:2px solid var(--ink); margin:20px 0}
  .strip .cell{flex:1; text-align:center; padding:14px 8px; border-right:1px solid var(--hair)}
  .strip .cell:last-child{border-right:none}
  .strip b{display:block; font-family:'Roboto',sans-serif; font-weight:900; font-size:34px}
  .strip small{font-family:'Roboto',sans-serif; text-transform:uppercase; letter-spacing:2px;
    font-size:10px; color:var(--ink-soft)}
  /* ---- Teams index ---- */
  .index{column-count:4; column-gap:22px; column-rule:1px solid var(--hair)}
  @media(max-width:760px){.index{column-count:2}}
  @media(max-width:420px){.index{column-count:1}}
  .entry{break-inside:avoid; display:flex; gap:7px; align-items:baseline; padding:3px 0;
    cursor:pointer; font-size:16px; border-bottom:1px dotted var(--hair)}
  .entry:hover{color:var(--accent)}
  .entry .fl{font-size:14px}
  .entry .dots{flex:1; border-bottom:1px dotted var(--hair); transform:translateY(-4px)}
  /* ---- Allocations (article columns) ---- */
  .person{break-inside:avoid; border:1px solid var(--ink); padding:16px; margin-bottom:18px; background:var(--paper-light)}
  .articles{column-count:2; column-gap:22px}
  @media(max-width:680px){.articles{column-count:1}}
  .person .who{font-family:'Roboto',sans-serif; font-weight:900; font-size:22px; line-height:1}
  .person .meta{font-family:'Roboto',sans-serif; font-style:italic; color:var(--faint);
    font-size:12px; margin:2px 0 10px; border-bottom:1px solid var(--hair); padding-bottom:8px}
  .person .crest{float:right; width:62px; height:62px; margin:0 0 6px 10px; border:1px solid var(--ink)}
  .teamlist{font-size:15px}
  .teamlist .tl{display:inline; cursor:pointer}
  .teamlist .tl:hover{color:var(--accent); text-decoration:underline}
  /* ---- Modal ---- */
  .modal{position:fixed; inset:0; background:rgba(26,24,20,.55); display:flex;
    align-items:center; justify-content:center; z-index:50; padding:18px}
  .box{background:var(--paper); border:1px solid var(--ink);
    box-shadow:6px 8px 0 rgba(26,24,20,.25); max-width:560px; width:100%;
    max-height:88vh; overflow:auto; padding:26px 30px}
  .box .x{float:right; background:none; border:none; font-family:'Roboto',sans-serif;
    font-size:30px; line-height:.6; cursor:pointer; color:var(--ink)}
  .box .x:hover{color:var(--accent)}
  .fact{border-top:1px solid var(--hair); padding:12px 0}
  .fact .ft{font-family:'Roboto',sans-serif; text-transform:uppercase; letter-spacing:2px;
    font-size:10px; color:var(--accent); font-weight:700; margin-bottom:2px}
  .fact .fv{font-size:19px}
  .pill{display:inline-block; border:1px solid var(--ink); font-family:'Roboto',sans-serif;
    text-transform:uppercase; letter-spacing:2px; font-size:10px; padding:3px 10px; margin-bottom:8px}
  .foot{border-top:3px double var(--ink); margin-top:30px; padding-top:14px; text-align:center;
    font-family:'Roboto',sans-serif; font-style:italic; font-size:12px; color:var(--faint); line-height:1.7}
  code{font-family:'Courier New',monospace; background:#e7dec9; padding:1px 4px}
  .who-link{color:inherit; text-decoration:none; border-bottom:2px solid var(--accent)}
  .who-link:hover{color:var(--accent)}
  .standings{width:100%; border-collapse:collapse; font-size:16px; border-top:2px solid var(--ink); border-bottom:2px solid var(--ink)}
  .standings th{font-family:'Roboto',sans-serif; text-transform:uppercase; letter-spacing:1px;
    font-size:10px; color:var(--ink-soft); text-align:left; padding:8px 10px; border-bottom:1px solid var(--ink)}
  .standings td{padding:9px 10px; border-bottom:1px dotted var(--hair); cursor:pointer}
  .standings tr:hover td{background:var(--hover-bg); color:var(--accent)}
  .standings .rk{font-family:'Roboto',sans-serif; font-weight:900; font-size:18px; width:54px}
  .standings .fl{font-size:15px}
  .standings .more{text-align:right; font-style:italic; color:var(--faint); font-size:13px; width:64px}
  a.btn{text-decoration:none; text-align:center}
  /* ==== Dark mode ==== */
  [data-theme="dark"]{
    --ink:#f0ebe0; --ink-soft:#b0a898; --faint:#6a6258;
    --paper:#1c1a16; --paper-2:#242018; --rule:#f0ebe0; --hair:#3a342c;
    --accent:#e86050; --paper-light:#252220; --hover-bg:#2e2924;
  }
  [data-theme="dark"] body{background:repeating-linear-gradient(0deg,rgba(255,255,255,0.014) 0 2px,transparent 2px 4px),var(--paper);}
  [data-theme="dark"] .sheet{box-shadow:0 1px 0 rgba(240,235,224,0.08),6px 8px 0 rgba(0,0,0,0.38);}
  [data-theme="dark"] .box{box-shadow:6px 8px 0 rgba(0,0,0,0.48);}
  /* ==== Pitch mode ==== */
  [data-theme="pitch"]{
    --ink:#f0f8e8; --ink-soft:#b0d098; --faint:#70a060;
    --paper:#2d8030; --paper-2:#28722a; --rule:#f0f8e8; --hair:#3a9a3d;
    --accent:#ffd700; --paper-light:#329635; --hover-bg:#3aaa3d;
  }
  [data-theme="pitch"] body{
    background:repeating-linear-gradient(180deg,rgba(0,0,0,0.09) 0 56px,transparent 56px 112px),var(--paper);
  }
  [data-theme="pitch"] .sheet{
    background:repeating-linear-gradient(180deg,rgba(255,255,255,0.04) 0 56px,transparent 56px 112px),var(--paper);
    border-color:rgba(255,255,255,0.28);
    box-shadow:0 1px 0 rgba(255,255,255,0.12),6px 8px 0 rgba(0,0,0,0.22);
  }
  [data-theme="pitch"] .box{border-color:rgba(255,255,255,0.28);box-shadow:6px 8px 0 rgba(0,0,0,0.22);}
  /* ==== Corner flags (pitch mode) ==== */
  .corner-flag{position:fixed;z-index:200;pointer-events:none;width:3px;height:30px;background:rgba(255,255,255,0.88);border-radius:1px;}
  .corner-flag::before{content:'';position:absolute;top:0;left:3px;width:0;height:0;border-top:10px solid #ffd700;border-right:16px solid transparent;}
  .corner-flag-tl{top:14px;left:16px;}
  .corner-flag-tr{top:14px;right:16px;transform:scaleX(-1);}
  .corner-flag-bl{bottom:14px;left:16px;transform:scaleY(-1);}
  .corner-flag-br{bottom:14px;right:16px;transform:scale(-1,-1);}
  /* ==== Theme switcher ==== */
  .theme-sw{position:fixed;bottom:18px;right:18px;z-index:150;display:flex;
    background:var(--paper);border:1px solid var(--hair);box-shadow:2px 2px 0 var(--ink);}
  .theme-sw button{background:none;border:none;cursor:pointer;padding:6px 10px;
    font-family:'Roboto',sans-serif;font-size:10px;text-transform:uppercase;
    letter-spacing:1.5px;font-weight:700;color:var(--faint);line-height:1.2;border-bottom:2px solid transparent;}
  .theme-sw button.tsw-on{color:var(--accent);border-bottom-color:var(--accent);}
  .theme-sw button:hover{color:var(--ink);}
  /* ==== Schedule responsive ==== */
  .sched-table{width:100%;border-collapse:collapse;}
  .sched-date{padding:6px 8px 6px 0;font-size:12px;color:var(--faint);white-space:nowrap;width:58px;}
  .sched-team{padding:6px 4px;font-size:15px;}
  .sched-home{text-align:right;}
  .sched-vs{padding:6px 8px;font-size:11px;color:var(--faint);text-align:center;white-space:nowrap;}
  .sched-venue{padding:6px 0 6px 6px;font-size:12px;color:var(--faint);text-align:right;white-space:nowrap;}
  @media(max-width:540px){.sched-venue{display:none;}.sched-team{font-size:13px;}.sched-vs{padding:6px 4px;}}
</style>
</head>

function hashTeams(teams){var s=teams.slice().sort().join("|");var h=2166136261>>>0;
for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;var t=Math.imul(a^(a>>>15),1|a);
t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

function buildEmblem(teams,size){size=size||132;var seed=hashTeams(teams);var rnd=mulberry32(seed);
var p=PALETTES[seed%PALETTES.length];var accent=p[0],dark=p[1],accent2=p[2],spark=p[3];
var c=size/2,rings=3+(seed%3),sides=3+(seed%6),nodes=teams.length,parts=[];
parts.push('<rect x="0" y="0" width="'+size+'" height="'+size+'" rx="20" fill="'+dark+'"/>');
parts.push('<rect x="0" y="0" width="'+size+'" height="'+size+'" rx="20" fill="url(#g'+(seed%1000)+')" opacity="0.5"/>');
for(var i=rings;i>=1;i--){var r=(i/rings)*(size*0.42),rot=rnd()*Math.PI,op=0.12+(i/rings)*0.4,col=i%2===0?accent:accent2;

var orbit=size*0.34;
for(var j=0;j<nodes;j++){var a=(j/nodes)*Math.PI*2+seed,x=c+Math.cos(a)*orbit,y=c+Math.sin(a)*orbit,rad=1.6+rnd()*2.6;
parts.push('<line x1="'+c+'" y1="'+c+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+accent+'" stroke-width="0.5" opacity="0.25"/>');
parts.push('<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+rad.toFixed(1)+'" fill="'+(j%5===0?spark:accent)+'"/>');} 
parts.push('<path d="'+poly(c,c,size*0.12,sides,rnd()*6,0.05,rnd)+'" fill="'+spark+'" opacity="0.9"/>');
parts.push('<circle cx="'+c+'" cy="'+c+'" r="'+(size*0.05).toFixed(1)+'" fill="'+dark+'"/>');

return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><defs>'+grad+'</defs>'+parts.join("")+"</svg>";}

for(var pp=0;pp<players.length;pp++)for(var q=0;q<per;q++)allocations[pp].teams.push(t[idx++]);

if(!state.draw)return;
var lines=state.draw.allocations.map(function(a){var mr=meanRank(a.teams);return a.name+(mr!=null?(" — mean FIFA rank "+mr.toFixed(1)):"")+"\n"+a.teams.map(function(t){return "  "+(FLAGS[t]||"")+" "+t+(FIFA_RANK[t]?(" (#"+FIFA_RANK[t]+")"):"");}).join("\n");});

}
function ghToken(){return ((document.getElementById('ghtoken')||{}).value||localStorage.getItem('wcsweep_gh_token')||'').trim();}
function ghRepo(){
  var host=location.hostname;
  var owner=host.indexOf('github.io')>=0?host.split('.')[0]:'barnandbee';
  var parts=location.pathname.replace(/\/$/,'').split('/').filter(Boolean);
  return {owner:owner,repo:parts.length?parts[0]:'sweep'};
}
function commitFile(path,content,commitMsg,onStart,onDone,onErr){
  var token=ghToken();
  if(!token){alert('Paste your GitHub personal access token first.');return;}
  localStorage.setItem('wcsweep_gh_token',token);
  onStart();
  var r=ghRepo();
  var apiBase='https://api.github.com/repos/'+r.owner+'/'+r.repo;
  var b64=btoa(unescape(encodeURIComponent(content)));
  fetch(apiBase+'/contents/'+path,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(function(res){return res.ok?res.json():null;})
    .then(function(existing){
      var body={message:commitMsg,content:b64};
      if(existing&&existing.sha)body.sha=existing.sha;
      return fetch(apiBase+'/contents/'+path,{
        method:'PUT',
        headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
    })
    .then(function(res){
      if(res&&res.ok){onDone();}
      else{return (res?res.json():Promise.resolve({message:'Network error'})).then(function(e){onErr(e.message||String(res?res.status:'error'));});}
    })
    .catch(function(e){onErr(e.message);});
}
function writeResults(content,commitMsg,onStart,onDone,onErr){
  commitFile('results.json',content,commitMsg,onStart,onDone,onErr);
}
function saveEntrants(){
  var list=(state._pendingEntrants||[]).slice();
  commitFile(
    'entrants.json',
    JSON.stringify(list,null,2)+'\n',
    'update entrants',
    function(){state._savingEntrants=true;state._saveEntrantsOk=false;state._saveEntrantsErr='';renderModals();},
    function(){state._savingEntrants=false;state._saveEntrantsOk=true;state.entrants=list;renderModals();},
    function(msg){state._savingEntrants=false;state._saveEntrantsErr=msg;renderModals();}
  );
}
function publishDraw(){
  if(!state.draw){alert('Run the draw first.');return;}
  writeResults(
    JSON.stringify(state.draw,null,2),
    'publish draw',
    function(){state._publishing=true;state._publishOk=false;state._publishErr='';renderModals();},
    function(){state._publishing=false;state._publishOk=true;renderModals();},
    function(msg){state._publishing=false;state._publishErr=msg;renderModals();}

}

function copyText(txt){
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).catch(fb);}else fb();
function fb(){var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}
}
function dlCrest(name){

link.download="crest-"+name.replace(/\s+/g,"_")+".svg";link.click();URL.revokeObjectURL(url);
}

/* ===== Game of Two Halves (Snake) ===== */
var GOT={COLS:20,ROWS:16,snake:[],dir:{x:1,y:0},nextDir:{x:1,y:0},food:null,score:[0,0],half:1,phase:'ready',startTime:0,halfMs:45000,lastMove:0,moveMs:140,raf:null,cell:28,_kh:null};
var GOTLB={chars:['A','A','A'],submitting:false,submitted:false,scores:[],scoresLoading:false};
function gotInit(){
if(GOT.raf)cancelAnimationFrame(GOT.raf);
if(GOT._kh)document.removeEventListener('keydown',GOT._kh);
var canvas=document.getElementById('gotCanvas');if(!canvas)return;
var maxW=Math.min(560,window.innerWidth-40);
GOT.cell=Math.max(18,Math.floor(maxW/GOT.COLS));
canvas.width=GOT.COLS*GOT.cell;canvas.height=GOT.ROWS*GOT.cell;
gotReset(false);
GOT._kh=function(e){gotKey(e);};document.addEventListener('keydown',GOT._kh);
var tc=null;
canvas.ontouchstart=function(e){tc=e.touches[0];e.preventDefault();};
canvas.ontouchend=function(e){
  if(!tc)return;
  var dx=e.changedTouches[0].clientX-tc.clientX,dy=e.changedTouches[0].clientY-tc.clientY;
  if(Math.abs(dx)<8&&Math.abs(dy)<8){gotAction();}
  else if(Math.abs(dx)>Math.abs(dy)){gotDir(dx>0?1:-1,0);}
  else{gotDir(0,dy>0?1:-1);}
};
GOT.raf=requestAnimationFrame(gotLoop);
}
function gotReset(keepHalf){
var g=GOT;
g.snake=[{x:Math.floor(g.COLS/2),y:Math.floor(g.ROWS/2)}];
g.dir={x:1,y:0};g.nextDir={x:1,y:0};
if(!keepHalf){g.score=[0,0];g.half=1;GOTLB.submitted=false;GOTLB.chars=['A','A','A'];}
g.food=null;g.phase='ready';g.startTime=0;g.lastMove=0;
gotPlaceFood();
}
function gotPlaceFood(){
var g=GOT,occ={};g.snake.forEach(function(s){occ[s.x+','+s.y]=1;});
var free=[];for(var x=0;x<g.COLS;x++)for(var y=0;y<g.ROWS;y++)if(!occ[x+','+y])free.push({x:x,y:y});
g.food=free.length?free[Math.floor(Math.random()*free.length)]:null;
}
function gotAction(){
var g=GOT;
if(g.phase==='ready'){g.phase='playing';g.startTime=Date.now();g.lastMove=Date.now();}
else if(g.phase==='halftime'){
  g.snake=[{x:Math.floor(g.COLS/2),y:Math.floor(g.ROWS/2)}];
  g.dir={x:1,y:0};g.nextDir={x:1,y:0};gotPlaceFood();
  g.phase='playing';g.startTime=Date.now();g.lastMove=Date.now();
}
else if(g.phase==='gameover'||g.phase==='fulltime'){gotReset(false);}
gotRenderEntry();
}
function gotDir(dx,dy){
var g=GOT;
if(g.phase==='ready'||g.phase==='halftime'){gotAction();}
if(g.phase!=='playing')return;
if(dx!==0&&dx===-g.dir.x)return;
if(dy!==0&&dy===-g.dir.y)return;
g.nextDir={x:dx,y:dy};
}
function gotKey(e){
var map={'ArrowUp':[0,-1],'ArrowDown':[0,1],'ArrowLeft':[-1,0],'ArrowRight':[1,0],'w':[0,-1],'s':[0,1],'a':[-1,0],'d':[1,0]};
if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.key)>=0)e.preventDefault();
if(e.key===' '||e.key==='Enter'){gotAction();return;}
var d=map[e.key];if(d)gotDir(d[0],d[1]);
}
function gotLoop(){
var canvas=document.getElementById('gotCanvas');
if(!canvas){if(GOT._kh)document.removeEventListener('keydown',GOT._kh);return;}
var ctx=canvas.getContext('2d'),g=GOT,now=Date.now(),prevPhase=g.phase;
if(g.phase==='playing'){
  if(now-g.startTime>=g.halfMs){
    if(g.half===1){g.phase='halftime';g.half=2;}else{g.phase='fulltime';}
  } else if(now-g.lastMove>=g.moveMs){g.lastMove=now;gotAdvance();}
}
gotDraw(ctx);
if(g.phase!==prevPhase){gotRenderEntry();if(g.phase==='fulltime')gotLoadAndRenderScores();}
g.raf=requestAnimationFrame(gotLoop);
}
function gotAdvance(){
var g=GOT;g.dir=g.nextDir;
var head={x:g.snake[0].x+g.dir.x,y:g.snake[0].y+g.dir.y};
if(head.x<0||head.x>=g.COLS||head.y<0||head.y>=g.ROWS){g.phase='gameover';return;}
for(var i=0;i<g.snake.length;i++)if(g.snake[i].x===head.x&&g.snake[i].y===head.y){g.phase='gameover';return;}
g.snake.unshift(head);
if(g.food&&head.x===g.food.x&&head.y===g.food.y){g.score[g.half-1]=(g.score[g.half-1]||0)+1;gotPlaceFood();}
else{g.snake.pop();}
}
function gotDraw(ctx){
var g=GOT,C=g.cell,W=g.COLS*C,H=g.ROWS*C;
ctx.fillStyle='#1e7a1e';ctx.fillRect(0,0,W,H);
for(var i=0;i<g.ROWS;i++){if(i%2===0){ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fillRect(0,i*C,W,C);}}
ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
ctx.beginPath();ctx.arc(W/2,H/2,C*2.5,0,Math.PI*2);ctx.stroke();
ctx.strokeRect(C*0.5,C*0.5,W-C,H-C);
if(g.food){
  ctx.font=Math.floor(C*0.82)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🥅',(g.food.x+0.5)*C,(g.food.y+0.5)*C);
}
ctx.textAlign='center';ctx.textBaseline='middle';
for(var j=g.snake.length-1;j>=0;j--){
  ctx.font=Math.floor(j===0?C*0.88:C*0.72)+'px serif';
  ctx.fillText('⚽',(g.snake[j].x+0.5)*C,(g.snake[j].y+0.5)*C);
}
var now=Date.now(),rem=g.startTime>0?Math.max(0,g.halfMs-(now-g.startTime)):g.halfMs;
var ss=Math.floor(rem/1000),mm=Math.floor(ss/60);ss=ss%60;
var hudH=Math.floor(C*1.5);
ctx.fillStyle='rgba(0,0,0,0.58)';ctx.fillRect(0,0,W,hudH);
ctx.fillStyle='#fff';ctx.font='bold '+Math.floor(C*0.62)+'px Roboto,sans-serif';
ctx.textAlign='left';ctx.fillText((g.half===1?'1ST':'2ND')+' HALF',6,Math.floor(hudH*0.65));
ctx.textAlign='center';ctx.fillText((g.score[0]||0)+'–'+(g.score[1]||0),W/2,Math.floor(hudH*0.65));
ctx.textAlign='right';ctx.fillText((mm>0?mm+':':'')+(ss<10?'0':'')+ss,W-6,Math.floor(hudH*0.65));
if(g.phase==='ready')gotOverlay(ctx,W,H,'⚽','GAME OF TWO HALVES','Arrow keys or swipe to move\nSpace or tap to kick off');
else if(g.phase==='halftime')gotOverlay(ctx,W,H,'⏸','HALF TIME','1st half: '+(g.score[0]||0)+' goal'+(g.score[0]!==1?'s':'')+' \nSpace or tap for 2nd half');
else if(g.phase==='gameover')gotOverlay(ctx,W,H,'😬','SENT OFF!','Hit a wall or yourself\nSpace or tap to restart');
else if(g.phase==='fulltime'){var tot=(g.score[0]||0)+(g.score[1]||0);gotOverlay(ctx,W,H,'🏆','FULL TIME',tot+' goal'+(tot!==1?'s':'')+' — '+g.score[0]+' + '+g.score[1]+'\nSpace or tap to play again');}
}
function gotOverlay(ctx,W,H,emoji,title,sub){
var C=GOT.cell,midY=H/2;
ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.font=Math.floor(C*1.9)+'px serif';ctx.fillText(emoji,W/2,midY-Math.floor(C*2));
ctx.font='bold '+Math.floor(C*1.1)+'px Roboto,sans-serif';ctx.fillStyle='#fff';
ctx.fillText(title,W/2,midY-Math.floor(C*0.4));
var lines=sub.split('\n');ctx.font=Math.floor(C*0.62)+'px Roboto,sans-serif';ctx.fillStyle='rgba(255,255,255,0.82)';
lines.forEach(function(line,i){ctx.fillText(line,W/2,midY+Math.floor(C*(0.65+i*0.95)));});
}

var btn=document.createElement('button');btn.textContent=opt[1];btn.dataset.t=opt[0];
btn.onclick=function(){applyTheme(opt[0]);};sw.appendChild(btn);});
applyTheme(localStorage.getItem('wcsweep_theme')||'');
}

/* ===== Router ===== */
window.addEventListener("hashchange", render);

/* ===== Boot ===== */
function initApp(){
  initTheme();
  if(typeof RESULTS!=="undefined"&&RESULTS&&RESULTS.allocations){state.draw=RESULTS;render();return;}
  var t=Date.now();
  Promise.all([
    fetch('results.json?_='+t).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch('entrants.json?_='+t).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch('lb.json?_='+t).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){
    var draw=res[0],ents=res[1],lb=res[2];
    if(draw&&draw.allocations)state.draw=draw;
    if(Array.isArray(ents))state.entrants=ents;
    if(lb&&lb.repo)state.lbConfig=lb;
    render();
  }).catch(function(){render();});
}
initApp();
</script>
